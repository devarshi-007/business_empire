name: Deploy business-board-game to GitHub Pages

on:
  push:
    branches: [main]
    paths:
      - "artifacts/business-board-game/**"
      - ".github/workflows/deploy.yml"
  workflow_dispatch: {}

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml   # ← added: monorepo lockfile location

      - name: Install dependencies
        run: pnpm install --no-frozen-lockfile

      - name: Build
        working-directory: artifacts/business-board-game
        env:
          BASE_PATH: /business_empire/
          NODE_ENV: production
          PORT: "5173"
        run: pnpm run build

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: artifacts/business-board-game/dist/public

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4